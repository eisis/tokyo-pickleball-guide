<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokyo / Kanagawa Pickleball Booking Guide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #f3f3f3;
    }
    a.button {
      background: #0f766e;
      color: white;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      display: inline-block;
    }
    @media (max-width: 700px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      th {
        display: none;
      }
      td {
        padding: 10px;
      }
      tr {
        margin-bottom: 16px;
        background: white;
        border-radius: 10px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<h1>Tokyo / Kanagawa Pickleball Booking Guide</h1>

<table>
  <thead>
    <tr>
      <th>施設名</th>
      <th>エリア</th>
      <th>確認方法</th>
      <th>予約</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>Pacific PICKLE CLUB</td>
      <td>有明（東京）</td>
      <td>利用時間 / 予約面数を選択</td>
      <td><a class="button" href="https://pacificpickleclub.resv.jp/" target="_blank">予約</a></td>
    </tr>

    <tr>
      <td>ピックルボールワン銀座新橋</td>
      <td>新橋（東京）</td>
      <td>表で確認可能</td>
      <td><a class="button" href="https://reserva.be/pboneginza/reserve?mode=service_staff&search_evt_no=aaeJwzNDQwsbQEAAQoATk" target="_blank">予約</a></td>
    </tr>

    <tr>
      <td>SEIBU FAST SPORTS FIELD 品川</td>
      <td>品川（東京）</td>
      <td>人数 → 日付 → 時間</td>
      <td><a class="button" href="https://www.tablecheck.com/ja/seibu-fast-sports/reserve/message" target="_blank">予約</a></td>
    </tr>

    <tr>
      <td>KPI PARK</td>
      <td>横浜（神奈川）</td>
      <td>表で確認可能</td>
      <td><a class="button" href="https://yoyaku.labola.jp/r/shop/3302/calendar_week/2026/5/25/" target="_blank">予約</a></td>
    </tr>
  </tbody>
</table>

</body>
</html>
